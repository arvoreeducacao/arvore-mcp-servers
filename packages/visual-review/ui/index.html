<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Review — by Árvore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              arvore: "#45D0C1",
              surface: { 0: "#09090b", 1: "#0f0f12", 2: "#16161a", 3: "#1e1e24" },
            },
          },
        },
      };
    </script>
    <style>
      .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
      input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
      input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: #3f3f46; }
      input[type="range"]::-moz-range-track { height: 4px; border-radius: 2px; background: #3f3f46; }
      input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #45d0c1; box-shadow: 0 0 0 3px #0f0f12; margin-top: -5px; }
      input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #45d0c1; border: 3px solid #0f0f12; }
      .route-card:hover { border-color: rgba(69,208,193,0.4); }
      .route-card.active { border-color: #45D0C1; background: rgba(69,208,193,0.08); }
      .compare-frame { border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; overflow: hidden; position: relative; }
    </style>
  </head>
  <body class="bg-surface-0 text-zinc-50 h-screen overflow-hidden antialiased" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;">
    <div class="grid grid-rows-[52px_1fr] grid-cols-[280px_1fr] h-screen">
      <header class="col-span-2 flex items-center gap-4 px-5 border-b border-white/[0.06] bg-surface-1/80 backdrop-blur-xl">
        <div class="flex items-center gap-2.5">
          <span class="text-arvore font-bold text-sm">◈</span>
          <span class="text-[13px] font-medium text-zinc-400 tracking-tight">Visual Review</span>
        </div>
        <div id="modeTabs" class="flex gap-px ml-5 bg-surface-2 rounded-lg p-[3px] border border-white/[0.06]">
          <button class="mode-tab px-3.5 py-1.5 text-xs font-medium rounded-md transition-all text-zinc-50 bg-surface-3 shadow-sm" data-mode="side">Side by Side</button>
          <button class="mode-tab px-3.5 py-1.5 text-xs font-medium rounded-md transition-all text-zinc-500 hover:text-zinc-400" data-mode="overlay">Overlay</button>
        </div>
        <div class="ml-auto flex items-center gap-3">
          <span id="statusBadge" class="text-[11px] px-2.5 py-1 rounded-full bg-surface-2 text-zinc-500 border border-white/[0.06] font-medium">Ready</span>
        </div>
      </header>

      <aside class="border-r border-white/[0.06] bg-surface-1 overflow-y-auto flex flex-col">
        <div class="p-4 border-b border-white/[0.06]">
          <div class="text-[10px] font-semibold uppercase tracking-widest text-zinc-500 mb-3">Auth Token</div>
          <input id="tokenInput" type="text" placeholder="Paste access_token..." class="w-full px-3 py-2 text-xs bg-surface-2 border border-white/[0.06] rounded-lg text-zinc-50 placeholder-zinc-600 outline-none focus:border-arvore/40 transition-colors font-mono" />
          <p class="text-[10px] text-zinc-600 mt-1.5">Copy from browser cookies (access_token)</p>
        </div>
        <div class="p-4 border-b border-white/[0.06]">
          <div class="text-[10px] font-semibold uppercase tracking-widest text-zinc-500 mb-3">Changed Routes</div>
          <div id="routesList" class="flex flex-col gap-1.5"></div>
          <div id="emptyRoutes" class="text-xs text-zinc-600 py-4 text-center hidden">No changed routes detected</div>
          <div class="mt-3 flex gap-1.5">
            <input id="customRouteInput" type="text" placeholder="/app-v2/..." class="flex-1 px-3 py-2 text-xs bg-surface-2 border border-white/[0.06] rounded-lg text-zinc-50 placeholder-zinc-600 outline-none focus:border-arvore/40 transition-colors" />
            <button id="addRouteBtn" class="px-3 py-2 rounded-lg text-xs font-medium bg-arvore/[0.12] text-arvore border border-arvore/20 hover:bg-arvore/20 transition-all">Go</button>
          </div>
        </div>
        <div id="routeParamsSection" class="p-4 border-b border-white/[0.06] hidden"></div>
        <div class="p-4 border-b border-white/[0.06]">
          <div class="text-[10px] font-semibold uppercase tracking-widest text-zinc-500 mb-3">Figma Frame</div>
          <input id="figmaUrlInput" type="text" placeholder="Paste Figma URL..." class="w-full px-3 py-2 text-xs bg-surface-2 border border-white/[0.06] rounded-lg text-zinc-50 placeholder-zinc-600 outline-none focus:border-arvore/40 transition-colors" />
          <button id="loadFigmaBtn" class="w-full mt-2 py-2 rounded-lg text-xs font-medium bg-arvore/[0.12] text-arvore border border-arvore/20 hover:bg-arvore/20 transition-all">Load Figma Frame</button>
        </div>
        <div id="controlsSection" class="p-4 border-b border-white/[0.06] hidden">
          <div class="text-[10px] font-semibold uppercase tracking-widest text-zinc-500 mb-3">Controls</div>
          <div class="flex items-center gap-2.5">
            <label class="text-xs text-zinc-500 font-medium min-w-[50px]">Opacity</label>
            <input type="range" id="opSlider" min="0" max="100" value="50" class="flex-1" />
            <span id="opVal" class="text-[11px] text-zinc-400 min-w-[32px] text-right tabular-nums font-medium">50%</span>
          </div>
        </div>
        <div id="statsSection" class="p-4 border-b border-white/[0.06] hidden">
          <div class="text-[10px] font-semibold uppercase tracking-widest text-zinc-500 mb-3">Comparison</div>
          <div class="grid grid-cols-2 gap-1.5">
            <div class="rounded-[10px] p-3 border border-white/[0.06] bg-surface-2">
              <div id="matchPct" class="text-lg font-bold tabular-nums tracking-tight text-green-500">-</div>
              <div class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wider">Match</div>
            </div>
            <div class="rounded-[10px] p-3 border border-white/[0.06] bg-surface-2">
              <div id="diffPct" class="text-lg font-bold tabular-nums tracking-tight text-red-500">-</div>
              <div class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wider">Different</div>
            </div>
          </div>
        </div>
        <div class="p-4 mt-auto">
          <button id="generatePromptBtn" class="w-full py-2.5 rounded-lg text-xs font-medium bg-surface-2 text-zinc-400 border border-white/[0.06] hover:bg-arvore/[0.12] hover:text-arvore hover:border-arvore/20 transition-all flex items-center justify-center gap-1.5 disabled:opacity-40 disabled:pointer-events-none" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Fix Prompt
          </button>
        </div>
      </aside>

      <main id="compareArea" class="relative overflow-hidden bg-surface-0">
        <div id="emptyState" class="flex flex-col items-center justify-center h-full gap-3 text-zinc-500">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <p class="text-sm">Select a route to start comparing</p>
        </div>

        <div id="sideBySideView" class="hidden grid grid-cols-2 gap-px h-full bg-white/[0.06]">
          <div id="sidePageContainer" class="bg-surface-0 overflow-auto relative pt-8">
            <span class="glass absolute top-3 left-3 text-[10px] font-semibold px-2.5 py-1 rounded-full z-[2] uppercase tracking-wider text-zinc-400">Local</span>
            <iframe id="sidePageFrame" class="border-0 bg-white block" title="Local"></iframe>
          </div>
          <div id="sideFigmaContainer" class="bg-surface-0 overflow-auto relative pt-8">
            <span class="glass absolute top-3 left-3 text-[10px] font-semibold px-2.5 py-1 rounded-full z-[2] uppercase tracking-wider text-zinc-400">Figma</span>
            <div id="sideFigmaEmpty" class="flex flex-col items-center justify-center h-full gap-3 px-6">
              <svg class="text-zinc-600" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <p class="text-xs text-zinc-500 text-center">Paste a Figma URL to compare</p>
              <input id="inlineFigmaInput" type="text" placeholder="Figma URL..." class="w-full px-3 py-2 text-xs bg-surface-2 border border-white/[0.06] rounded-lg text-zinc-50 placeholder-zinc-600 outline-none focus:border-arvore/40 transition-colors" />
              <button id="inlineFigmaBtn" class="w-full py-2 rounded-lg text-xs font-medium bg-arvore/[0.12] text-arvore border border-arvore/20 hover:bg-arvore/20 transition-all">Load</button>
            </div>
            <img id="sideFigmaImg" class="bg-white block w-full hidden" alt="" />
          </div>
        </div>

        <div id="overlayView" class="hidden h-full overflow-auto relative p-2">
          <div id="overlayWrapper" class="relative mx-auto">
            <iframe id="overlayPageFrame" class="absolute inset-0 w-full h-full border-0 bg-white" title="Local"></iframe>
            <img id="overlayFigmaImg" class="w-full pointer-events-none" style="opacity: 0.5; mix-blend-mode: difference;" alt="" />
          </div>
        </div>


        <div id="paramsOverlay" class="hidden absolute inset-0 bg-surface-0 z-40"></div>

        <div id="loadingOverlay" class="absolute inset-0 bg-surface-0/80 backdrop-blur-sm flex items-center justify-center z-50 hidden">
          <div class="flex flex-col items-center gap-3">
            <div class="w-6 h-6 border-2 border-arvore border-t-transparent rounded-full animate-spin"></div>
            <span class="text-xs text-zinc-400" id="loadingText">Capturing page...</span>
          </div>
        </div>
      </main>
    </div>

    <div id="toast" class="glass fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-2 px-4 py-2 rounded-[10px] text-xs text-zinc-50 z-[100] opacity-0 transition-all duration-300 pointer-events-none font-medium"></div>
    <script src="/vr/app.js"></script>
  </body>
</html>
