[project]
name = "arvore-video-analyzer-mcp"
version = "0.1.0"
description = "MCP server that turns a video (local file or URL) into frames and transcription for AI consumption"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "mcp[cli]>=1.2.0",
    "httpx>=0.27.0",
    "yt-dlp>=2024.8.6",
    "pillow>=10.0.0",
    "imagehash>=4.3.1",
    "uvicorn>=0.30.0",
    "starlette>=0.37.0",
]

[project.scripts]
arvore-video-analyzer-mcp = "video_analyzer.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/video_analyzer"]
