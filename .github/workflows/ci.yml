name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:cov

      - name: Build all packages
        run: pnpm build

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/*/coverage/coverage-final.json
          fail_ci_if_error: false

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Detect changed packages
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "No valid previous commit, comparing against parent of HEAD"
            BEFORE="HEAD~1"
          fi
          echo "Comparing $BEFORE...${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'packages/**' \
            | sed -n 's#^packages/\([^/]*\)/.*#\1#p' \
            | sort -u)
          echo "Changed packages:"
          echo "$CHANGED"
          echo "packages<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.changed.outputs.packages != ''
        run: pnpm install --frozen-lockfile

      - name: Build packages
        if: steps.changed.outputs.packages != ''
        run: pnpm build

      - name: Install latest npm
        if: steps.changed.outputs.packages != ''
        run: npm install -g npm@latest

      - name: Publish changed packages
        if: steps.changed.outputs.packages != ''
        env:
          CHANGED_PACKAGES: ${{ steps.changed.outputs.packages }}
        run: |
          echo "$CHANGED_PACKAGES" | while IFS= read -r name; do
            [ -z "$name" ] && continue
            pkg="packages/$name/"
            if [ ! -d "$pkg" ]; then
              echo "Skipping $name (directory removed)"
              continue
            fi
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --access public --provenance 2>&1 || {
              echo "Provenance publish failed for $pkg, retrying without provenance (first publish)..."
              npm publish --access public 2>&1 || echo "Skipped $pkg (already published or error)"
            }
            cd ../..
          done
